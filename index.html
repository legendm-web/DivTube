<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>DivTube Sovereign Omni</title>
    <script>
        if (window.trustedTypes && window.trustedTypes.createPolicy) {
            window.trustedTypes.createPolicy('default', {
                createHTML: (s) => s, createScript: (s) => s, createScriptURL: (s) => s
            });
        }
    </script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305; --sidebar: #08080c; --card: #0f0f17;
            --primary: #a78bfa; --text: #f8fafc; --text-dim: #94a3b8;
            --border: rgba(255,255,255,0.08); --accent: #1e1b4b;
            --danger: #f87171; --surface: rgba(255,255,255,0.04);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; transition: background 0.2s, border 0.2s; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar & Navigation */
        aside { width: 250px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.25rem; margin: 0 0 2.5rem 1rem; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .nav-group { margin-bottom: 2rem; }
        .nav-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin: 0 0 0.75rem 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: var(--surface); color: white; }
        .nav-item.active { background: var(--accent); color: var(--primary); }

        /* Main Viewport */
        main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .header { padding: 0.8rem 2rem; display: flex; align-items: center; background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid var(--border); }
        .search-container { flex: 1; max-width: 600px; margin: 0 auto; position: relative; }
        .search-bar { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px 24px; border-radius: 100px; outline: none; }
        .search-bar:focus { border-color: var(--primary); }

        .viewport { flex: 1; overflow-y: auto; padding: 2rem; scroll-behavior: smooth; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem 1.5rem; }
        
        /* Video Cards */
        .card { cursor: pointer; }
        .card:hover .thumb-img { transform: scale(1.05); }
        .thumb-box { position: relative; aspect-ratio: 16/9; border-radius: 14px; overflow: hidden; background: #111; margin-bottom: 0.8rem; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s ease; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .meta { display: grid; grid-template-columns: 36px 1fr; gap: 12px; }
        .chan-pfp { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(45deg, var(--accent), var(--primary)); }
        .v-title { font-size: 0.95rem; font-weight: 700; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-details { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

        /* Watch Page */
        .watch-layout { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; max-width: 1600px; margin: 0 auto; }
        #player-frame { border-radius: 20px; aspect-ratio: 16/9; background: #000; width: 100%; overflow: hidden; }

        /* Settings Dashboard */
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .settings-card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; }
        .settings-card h4 { margin: 0 0 1rem 0; color: var(--primary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .block-tag { display: inline-flex; align-items: center; background: rgba(248, 113, 113, 0.1); color: var(--danger); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; margin: 0 8px 8px 0; border: 1px solid rgba(248, 113, 113, 0.2); }
        .log-box { font-family: monospace; font-size: 0.7rem; color: var(--primary); background: #000; padding: 12px; border-radius: 10px; height: 100px; overflow-y: auto; margin-top: 10px; border: 1px solid var(--border); }

        /* UI Elements */
        #loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--primary); width: 0%; z-index: 1000; transition: 0.3s; }
        #boot { position: fixed; inset: 0; background: #030305; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--surface); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-bar"></div>
<div id="boot"><div class="spinner"></div><div style="font-size:10px; letter-spacing:3px; opacity:0.5;">OMNI_SOVEREIGN_V61</div></div>

<aside>
    <div class="logo" onclick="app.nav('/home')">✧ DIVTUBE</div>
    <div class="nav-group">
        <div class="nav-item" id="link-home" onclick="app.nav('/home')">🏠 Home</div>
        <div class="nav-item" id="link-search" onclick="app.nav('/search')">🧭 Discover</div>
        <div class="nav-item" id="link-liked" onclick="app.nav('/liked')">❤️ Liked</div>
    </div>
    <div class="nav-label">Engine</div>
    <div class="nav-group">
        <div class="nav-item" id="link-history" onclick="app.nav('/history')">📜 History</div>
        <div class="nav-item" id="link-settings" onclick="app.nav('/settings')">⚙️ Settings</div>
    </div>
</aside>

<main>
    <header class="header">
        <div class="search-container">
            <input type="text" class="search-bar" id="globalSearch" placeholder="Search vectors..." onkeydown="if(event.key==='Enter') app.performSearch(this.value)">
        </div>
    </header>

    <div class="viewport">
        <section id="view-home" class="view" style="display:none;"><div id="home-grid" class="video-grid"></div></section>
        <section id="view-search" class="view" style="display:none;"><div id="search-grid" class="video-grid"></div></section>
        <section id="view-history" class="view" style="display:none;"><div id="history-grid" class="video-grid"></div></section>
        <section id="view-liked" class="view" style="display:none;"><div id="liked-grid" class="video-grid"></div></section>
        <section id="view-channel" class="view" style="display:none;"><h2 id="chan-name" style="color:var(--primary); margin-bottom:2rem;">Channel</h2><div id="chan-grid" class="video-grid"></div></section>
        
        <section id="view-watch" class="view" style="display:none;">
            <div class="watch-layout">
                <div class="main-player">
                    <div id="player-frame"></div>
                    <h1 id="p-title" style="margin: 1.5rem 0 0.5rem 0; font-size: 1.3rem;"></h1>
                    <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:1.5rem; border-bottom:1px solid var(--border);">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div class="chan-pfp"></div>
                            <div id="p-chan" style="font-weight:700; cursor:pointer;"></div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button id="like-btn" onclick="app.toggleLike()" style="background:var(--surface); border:1px solid var(--border); color:white; padding:10px 22px; border-radius:100px; font-weight:700; cursor:pointer;">Like</button>
                            <button onclick="app.blockChannel()" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:10px 22px; border-radius:100px; font-weight:700; cursor:pointer;">Block</button>
                        </div>
                    </div>
                </div>
                <div id="rec-sidebar"></div>
            </div>
        </section>

        <section id="view-settings" class="view" style="display:none;">
            <div class="settings-grid">
                <div class="settings-card">
                    <h4>Neural Configuration</h4>
                    <label style="font-size:0.8rem; opacity:0.6;">Entropy (Randomness): <span id="v-temp">1.0</span>x</label>
                    <input type="range" id="w-temp" min="1" max="50" value="10" oninput="app.syncSettings()" style="width:100%; margin:10px 0; accent-color:var(--primary);">
                    <div class="log-box" id="neural-log">VECTORS: Ready</div>
                </div>
                <div class="settings-card">
                    <h4>API Infrastructure</h4>
                    <textarea id="keyPoolInput" class="search-bar" style="height:80px; border-radius:12px; font-size:0.75rem; margin-bottom:10px;"></textarea>
                    <button onclick="app.saveKeys()" style="width:100%; background:var(--primary); color:black; padding:10px; border-radius:10px; font-weight:800; border:none; cursor:pointer;">DEPLOY KEYS</button>
                </div>
                <div class="settings-card">
                    <h4>Content Governance</h4>
                    <div id="block-list-ui" style="margin-bottom:15px; min-height:40px;"></div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button onclick="app.exportData()" style="background:var(--surface); color:white; border:1px solid var(--border); padding:10px; border-radius:10px; cursor:pointer;">Export JSON</button>
                        <button onclick="document.getElementById('importFile').click()" style="background:var(--surface); color:white; border:1px solid var(--border); padding:10px; border-radius:10px; cursor:pointer;">Import JSON</button>
                    </div>
                    <input type="file" id="importFile" hidden onchange="app.importData(event)">
                </div>
            </div>
        </section>
    </div>
</main>

<py-config>
    packages = ["numpy", "scikit-learn"]
</py-config>

<script type="py">
import json
import random
from js import window
from sklearn.feature_extraction.text import TfidfVectorizer
from sklearn.metrics.pairwise import cosine_similarity

def engine_v61(pool_json, brain_json):
    pool = json.loads(pool_json)
    brain = json.loads(brain_json)
    if not pool: return "[]"
    
    # Blocklist Filtering
    blocked = brain.get('blocklist', [])
    pool = [v for v in pool if v.get('channel') not in blocked]
    
    try:
        corpus = [f"{v['title']} {v.get('channel','')}" for v in pool]
        vectorizer = TfidfVectorizer(stop_words='english')
        tfidf_matrix = vectorizer.fit_transform(corpus)
        
        # Neural Profile (Weighted 3x for Search)
        h_text = " ".join([f"{h['title']}" for h in brain.get('history', [])[-10:]])
        l_text = " ".join([f"{l['title']}" for l in brain.get('liked', [])])
        s_text = " ".join(brain.get('search_history', [])[-5:] * 3)
        profile = (h_text + " " + l_text + " " + s_text).strip()
        
        if profile:
            window.updateNeuralLog(", ".join(vectorizer.get_feature_names_out()[:12]))
            p_vec = vectorizer.transform([profile])
            scores = cosine_similarity(p_vec, tfidf_matrix).flatten()
            temp = brain.get('weights', {}).get('temp', 10) / 10.0
            
            for i, v in enumerate(pool):
                noise = random.uniform(0, 0.1) * temp
                v['score'] = int((scores[i] + noise) * 100)
        
        pool.sort(key=lambda x: x.get('score', 0), reverse=True)
    except: pass
    return json.dumps(pool)

window.pyEngine = engine_v61
window.app.onReady()
</script>

<script>
const BASE = "/DivTube";
const app = {
    db: JSON.parse(localStorage.getItem('DIV_SOV_V61')) || { 
        keys: [], pool: [], search_results: [], 
        brain: { history: [], liked: [], search_history: [], blocklist: [], weights: {temp: 10} }, kIdx: 0 
    },

    onReady() { 
        document.getElementById('boot').style.opacity = '0';
        setTimeout(() => document.getElementById('boot').remove(), 500);
        this.init(); 
    },

    init() { 
        document.getElementById('keyPoolInput').value = this.db.keys.join('\n');
        this.renderBlocklist();
        this.syncSettings();
        this.route(); 
        window.onpopstate = () => this.route();
    },

    save() { localStorage.setItem('DIV_SOV_V61', JSON.stringify(this.db)); },

    syncSettings() {
        this.db.brain.weights = { temp: parseInt(document.getElementById('w-temp').value || 10) };
        document.getElementById('v-temp').innerText = (this.db.brain.weights.temp / 10).toFixed(1);
        this.save();
    },

    async fetchVideos(q, type = 'home', channelId = null) {
        if (!this.db.keys.length) return;
        const bar = document.getElementById('loading-bar');
        bar.style.width = '30%';

        const key = this.db.keys[this.db.kIdx];
        let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=24&type=video&key=${key}&q=${encodeURIComponent(q)}`;
        if (channelId) url += `&channelId=${channelId}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            bar.style.width = '60%';

            const ids = data.items.map(v => v.id.videoId).join(',');
            const metaRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids}&key=${key}`);
            const meta = await metaRes.json();

            const vids = data.items.map(v => {
                const m = meta.items.find(mi => mi.id === v.id.videoId);
                return {
                    id: v.id.videoId, title: v.snippet.title, channel: v.snippet.channelTitle,
                    channelId: v.snippet.channelId, thumb: v.snippet.thumbnails.high.url,
                    views: m ? parseInt(m.statistics.viewCount).toLocaleString() : '0',
                    duration: m ? m.contentDetails.duration.replace('PT','').replace(/[SHM]/g, x => x === 'M' ? ':' : '') : ''
                };
            });

            if (type === 'home') { this.db.pool = vids; this.renderGrid('home-grid', vids); }
            else if (type === 'search') { this.db.search_results = vids; this.renderGrid('search-grid', vids); }
            else if (type === 'watch') { this.renderGrid('rec-sidebar', vids, true); }
            else if (type === 'chan') { this.renderGrid('chan-grid', vids); }
            
            this.save();
            bar.style.width = '100%';
            setTimeout(() => bar.style.width = '0%', 400);
        } catch (e) { 
            this.db.kIdx = (this.db.kIdx + 1) % this.db.keys.length; 
        }
    },

    performSearch(q) {
        this.db.brain.search_history.push(q);
        this.fetchVideos(q, 'search');
        this.nav('/search');
    },

    nav(path) { 
        if(path === '/home') {
            const seed = this.db.brain.search_history.slice(-1)[0] || "trending space technology";
            this.fetchVideos(seed, 'home');
        }
        window.history.pushState({}, "", BASE + path); 
        this.route(); 
    },

    route() {
        const path = window.location.pathname.replace(BASE, "").split('?')[0] || '/home';
        const params = new URLSearchParams(window.location.search);
        
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

        const current = path.substring(1) || 'home';
        if (document.getElementById(`view-${current}`)) document.getElementById(`view-${current}`).style.display = 'block';
        if (document.getElementById(`link-${current}`)) document.getElementById(`link-${current}`).classList.add('active');

        if (path === '/home') this.renderGrid('home-grid', this.db.pool);
        if (path === '/search') this.renderGrid('search-grid', this.db.search_results);
        if (path === '/history') this.renderGrid('history-grid', this.db.brain.history);
        if (path === '/liked') this.renderGrid('liked-grid', this.db.brain.liked);
        if (path === '/watch') this.play(params.get('v'));
        if (path === '/channel') {
            document.getElementById('chan-name').innerText = params.get('name');
            this.fetchVideos("", 'chan', params.get('id'));
        }
    },

    renderGrid(tid, data, isSmall = false) {
        if(!window.pyEngine || !data) return;
        const ranked = JSON.parse(window.pyEngine(JSON.stringify(data), JSON.stringify(this.db.brain)));
        document.getElementById(tid).innerHTML = ranked.map(v => isSmall ? `
            <div style="display:grid; grid-template-columns:150px 1fr; gap:12px; margin-bottom:1rem; cursor:pointer;" onclick="app.nav('/watch?v=${v.id}')">
                <img src="${v.thumb}" style="width:100%; border-radius:10px;">
                <div style="font-size:0.85rem; font-weight:700; line-height:1.2;">${v.title}</div>
            </div>` : `
            <div class="card" onclick="app.nav('/watch?v=${v.id}')">
                <div class="thumb-box"><img src="${v.thumb}" class="thumb-img"><div class="duration">${v.duration}</div></div>
                <div class="meta">
                    <div class="chan-pfp"></div>
                    <div>
                        <div class="v-title">${v.title}</div>
                        <div class="v-details" onclick="event.stopPropagation(); app.nav('/channel?id=${v.channelId}&name=${encodeURIComponent(v.channel)}')">${v.channel}</div>
                        <div class="v-details">${v.views} views • ${v.score || 0}% match</div>
                    </div>
                </div>
            </div>`).join('');
    },

    play(id) {
        const video = [...this.db.pool, ...this.db.search_results, ...this.db.brain.history, ...this.db.brain.liked].find(v => v.id === id);
        if (!video) return;
        this.db.brain.history = [video, ...this.db.brain.history.filter(x => x.id !== id)].slice(0, 50);
        this.save();

        document.getElementById('player-frame').innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
        document.getElementById('p-title').innerText = video.title;
        document.getElementById('p-chan').innerText = video.channel;
        document.getElementById('p-chan').onclick = () => app.nav(`/channel?id=${video.channelId}&name=${encodeURIComponent(video.channel)}`);
        
        this.fetchVideos(video.title, 'watch');
        this.updateLikeBtn(id);
    },

    blockChannel() {
        const chan = document.getElementById('p-chan').innerText;
        if(confirm(`Block all content from ${chan}?`)) {
            this.db.brain.blocklist.push(chan);
            this.save(); this.renderBlocklist(); this.nav('/home');
        }
    },

    renderBlocklist() {
        const ui = document.getElementById('block-list-ui');
        ui.innerHTML = this.db.brain.blocklist.length ? this.db.brain.blocklist.map((c, i) => `
            <span class="block-tag">${c} <span onclick="app.removeBlock(${i})" style="cursor:pointer; margin-left:5px;">×</span></span>
        `).join('') : '<div style="font-size:0.8rem; opacity:0.3;">No channels blocked.</div>';
    },

    removeBlock(i) { this.db.brain.blocklist.splice(i, 1); this.save(); this.renderBlocklist(); },

    saveKeys() {
        this.db.keys = document.getElementById('keyPoolInput').value.split('\n').filter(k => k.trim());
        this.save(); alert("Neural Infrastructure Updated.");
    },

    toggleLike() {
        const id = new URLSearchParams(window.location.search).get('v');
        const video = [...this.db.pool, ...this.db.brain.history, ...this.db.search_results].find(v => v.id === id);
        if (this.db.brain.liked.some(v => v.id === id)) this.db.brain.liked = this.db.brain.liked.filter(v => v.id !== id);
        else this.db.brain.liked.push(video);
        this.save(); this.updateLikeBtn(id);
    },

    updateLikeBtn(id) {
        const isLiked = this.db.brain.liked.some(v => v.id === id);
        const btn = document.getElementById('like-btn');
        btn.innerText = isLiked ? 'Liked' : 'Like';
        btn.style.background = isLiked ? 'var(--primary)' : 'var(--surface)';
        btn.style.color = isLiked ? 'black' : 'white';
    },

    exportData() {
        const blob = new Blob([JSON.stringify(this.db)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'sovereign_v61_backup.json'; a.click();
    },

    importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => { this.db = JSON.parse(event.target.result); this.save(); location.reload(); };
        reader.readAsText(e.target.files[0]);
    }
};

window.updateNeuralLog = (txt) => { document.getElementById('neural-log').innerText = "VECTORS: " + txt; };
window.app = app;
</script>
</body>
</html>
